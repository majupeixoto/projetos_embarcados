; ─── PlatformIO Project Configuration ─────────────────────────────────────────
; Pulseira de Assistência ao Idoso — ESP32 + FreeRTOS
; ───────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform    = espressif32
board       = esp32dev
framework   = arduino

; Bibliotecas
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0
    ; Wire (I2C) já faz parte do framework Arduino — não precisa ser declarada aqui.
    ; Se o IntelliSense reclamar, rode: pio run (gera os headers automaticamente).

; Monitor serial
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3   ; Habilita logs de Wi-Fi/BT via ESP-IDF

; Partição padrão (sem OTA); troque por partitions_ota.csv quando adicionar OTA
; board_build.partitions = partitions_ota.csv

; ─── Ambiente de Benchmark (Trabalho Acadêmico) ──────────────────────────────
; Compila benchmarks/benchmark.cpp em vez de src/main.cpp.
; Para usar: pio run -e benchmark
;            pio run -e benchmark -t upload
;            pio device monitor -e benchmark
[env:benchmark]
platform    = espressif32
board       = esp32dev
framework   = arduino
build_src_filter = -<src/> +<benchmarks/>
lib_deps    =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
