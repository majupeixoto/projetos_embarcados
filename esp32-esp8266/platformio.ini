[env:esp8266dev]
platform    = espressif8266
board       = d1_mini
framework   = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0

monitor_speed   = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=3

